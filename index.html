<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CycleCoach">
<meta name="theme-color" content="#0A0F1E">
<title>CycleCoach — O teu Treinador de Ciclismo</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --orange: #F97316;
    --orange-deep: #C2410C;
    --bg: #0A0F1E;
    --surface: #111827;
    --surface2: #1E293B;
    --border: rgba(249,115,22,0.18);
    --text: #F1F5F9;
    --muted: #94A3B8;
    --green: #22C55E;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    color: var(--text);
  }

  /* ── SETUP SCREEN ── */
  #setup {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 32px 24px;
    z-index: 100;
  }
  #setup .logo {
    width: 80px; height: 80px; border-radius: 22px;
    background: linear-gradient(135deg, var(--orange), var(--orange-deep));
    display: flex; align-items: center; justify-content: center;
    font-size: 40px; margin-bottom: 24px;
    box-shadow: 0 8px 32px rgba(249,115,22,0.35);
  }
  #setup h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 6px; }
  #setup p  { color: var(--muted); font-size: 14px; text-align: center; margin-bottom: 36px; line-height: 1.5; }
  #setup label { font-size: 12px; font-weight: 600; color: var(--orange); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; display: block; align-self: flex-start; width: 100%; max-width: 400px; }
  #setup input[type=text], #setup input[type=password] {
    width: 100%; max-width: 400px;
    background: var(--surface2); border: 1.5px solid var(--border);
    border-radius: 12px; padding: 14px 16px;
    color: var(--text); font-size: 15px; font-family: inherit;
    outline: none; margin-bottom: 16px;
    transition: border-color 0.2s;
  }
  #setup input:focus { border-color: var(--orange); }
  #setup button {
    width: 100%; max-width: 400px;
    background: linear-gradient(135deg, var(--orange), var(--orange-deep));
    border: none; border-radius: 14px; padding: 16px;
    color: #fff; font-size: 16px; font-weight: 700;
    cursor: pointer; font-family: inherit;
    box-shadow: 0 4px 20px rgba(249,115,22,0.4);
    transition: opacity 0.2s, transform 0.1s;
  }
  #setup button:active { transform: scale(0.98); opacity: 0.9; }
  #setup .hint { font-size: 11px; color: var(--muted); text-align: center; margin-top: 14px; line-height: 1.6; max-width: 340px; }
  #setup .hint a { color: var(--orange); text-decoration: none; }
  #setup-error { color: #F87171; font-size: 13px; margin-top: -8px; margin-bottom: 12px; max-width: 400px; width: 100%; display: none; }

  /* ── APP SHELL ── */
  #app {
    display: none;
    flex-direction: column;
    height: 100%;
    height: -webkit-fill-available;
  }

  /* Header */
  #header {
    background: rgba(10,15,30,0.96);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: calc(var(--safe-top) + 12px) 16px 12px;
    display: flex; align-items: center; gap: 12px;
    flex-shrink: 0; z-index: 10;
  }
  #header .avatar {
    width: 40px; height: 40px; border-radius: 12px;
    background: linear-gradient(135deg, var(--orange), var(--orange-deep));
    display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0;
  }
  #header .info .name { font-weight: 700; font-size: 16px; }
  #header .info .sub  { font-size: 11px; color: var(--orange); font-weight: 500; }
  #header .status { margin-left: auto; display: flex; align-items: center; gap: 6px; }
  #header .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 6px var(--green); }
  #header .status-text { font-size: 11px; color: var(--muted); }
  #reset-btn {
    background: none; border: 1px solid var(--border); border-radius: 8px;
    color: var(--muted); font-size: 11px; padding: 5px 10px; cursor: pointer;
    font-family: inherit; margin-left: 8px; transition: all 0.2s;
  }
  #reset-btn:hover { border-color: var(--orange); color: var(--orange); }

  /* Messages */
  #messages {
    flex: 1; overflow-y: auto; padding: 20px 16px 8px;
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
  }
  #messages::-webkit-scrollbar { width: 0; }

  .msg-row {
    display: flex; margin-bottom: 14px;
    animation: fadeUp 0.25s ease;
  }
  @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

  .msg-row.user  { justify-content: flex-end; }
  .msg-row.bot   { justify-content: flex-start; }

  .bot-avatar {
    width: 32px; height: 32px; border-radius: 10px;
    background: linear-gradient(135deg, var(--orange), var(--orange-deep));
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0; margin-right: 8px; margin-top: 2px;
  }

  .bubble {
    max-width: 80%; padding: 11px 15px;
    line-height: 1.55; font-size: 14.5px;
    border-radius: 18px;
  }
  .bubble.user {
    background: linear-gradient(135deg, var(--orange), var(--orange-deep));
    border-bottom-right-radius: 4px;
    color: #fff;
  }
  .bubble.bot {
    background: var(--surface2);
    border-bottom-left-radius: 4px;
    color: var(--text);
  }
  .bubble strong { font-weight: 700; }
  .bubble ul, .bubble ol { padding-left: 18px; margin: 6px 0; }
  .bubble li { margin-bottom: 3px; }
  .bubble .section-title { color: var(--orange); font-weight: 700; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; margin: 8px 0 4px; }

  /* Typing */
  .typing-row { display: flex; align-items: center; margin-bottom: 14px; }
  .typing-bubble { background: var(--surface2); border-radius: 18px; border-bottom-left-radius: 4px; padding: 12px 16px; display: flex; gap: 5px; align-items: center; }
  .typing-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--orange); animation: bounce 1.2s ease-in-out infinite; }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-7px)} }

  /* Quick prompts */
  #quick-prompts {
    padding: 8px 16px 4px; display: flex; gap: 7px; flex-wrap: nowrap;
    overflow-x: auto; flex-shrink: 0;
  }
  #quick-prompts::-webkit-scrollbar { display: none; }
  .qp-btn {
    background: rgba(249,115,22,0.08);
    border: 1px solid rgba(249,115,22,0.25);
    color: var(--orange); border-radius: 20px;
    padding: 6px 13px; font-size: 12px; white-space: nowrap;
    cursor: pointer; font-family: inherit; flex-shrink: 0;
    transition: background 0.2s;
  }
  .qp-btn:active { background: rgba(249,115,22,0.2); }

  /* Input bar */
  #input-bar {
    padding: 10px 12px calc(var(--safe-bottom) + 10px);
    background: rgba(10,15,30,0.96);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-top: 1px solid var(--border);
    display: flex; gap: 8px; align-items: flex-end; flex-shrink: 0;
  }
  #user-input {
    flex: 1; background: var(--surface2);
    border: 1.5px solid var(--border); border-radius: 22px;
    padding: 12px 16px; color: var(--text);
    font-size: 15px; font-family: inherit; resize: none;
    max-height: 120px; min-height: 46px; line-height: 1.4;
    outline: none; transition: border-color 0.2s;
    overflow-y: auto;
  }
  #user-input:focus { border-color: var(--orange); }
  #user-input::placeholder { color: var(--muted); }

  #send-btn {
    width: 46px; height: 46px; border-radius: 50%;
    background: linear-gradient(135deg, var(--orange), var(--orange-deep));
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-size: 18px; transition: transform 0.1s, opacity 0.2s;
    box-shadow: 0 2px 12px rgba(249,115,22,0.4);
  }
  #send-btn:active { transform: scale(0.92); }
  #send-btn:disabled { opacity: 0.4; cursor: default; }

  /* Date separator */
  .date-sep { text-align: center; color: var(--muted); font-size: 11px; margin: 8px 0 16px; }

  /* Responsive */
  @media (min-width: 600px) {
    #setup { background: radial-gradient(ellipse at 60% 30%, rgba(249,115,22,0.08) 0%, var(--bg) 70%); }
    #app { max-width: 480px; margin: 0 auto; border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
    body { background: var(--bg); }
  }
</style>
</head>
<body>

<!-- SETUP -->
<div id="setup">
  <div class="logo">🚴</div>
  <h1>CycleCoach</h1>
  <p>O teu treinador pessoal de ciclismo com IA.<br>Treinos, nutrição, técnica e muito mais.</p>

  <label for="api-key">Chave API Anthropic</label>
  <input type="password" id="api-key" placeholder="sk-ant-..." autocomplete="off" spellcheck="false">
  <div id="setup-error"></div>

  <label for="athlete-name">O teu nome (opcional)</label>
  <input type="text" id="athlete-name" placeholder="Ex: João" autocomplete="given-name">

  <button id="start-btn" onclick="startApp()">Começar a treinar →</button>

  <p class="hint">
    Precisas de uma chave API gratuita da Anthropic.<br>
    Cria a tua em <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a>
  </p>
</div>

<!-- APP -->
<div id="app">
  <div id="header">
    <div class="avatar">🚴</div>
    <div class="info">
      <div class="name">CycleCoach</div>
      <div class="sub">Treinador Especialista</div>
    </div>
    <div class="status">
      <div class="dot"></div>
      <span class="status-text">Online</span>
    </div>
    <button id="reset-btn" onclick="resetApp()">Sair</button>
  </div>

  <div id="messages"></div>

  <div id="quick-prompts">
    <button class="qp-btn" onclick="quickSend('Como fazer um teste de FTP?')">Teste FTP</button>
    <button class="qp-btn" onclick="quickSend('Cria um plano de treino para iniciante')">Plano iniciante</button>
    <button class="qp-btn" onclick="quickSend('O que comer antes de um treino longo?')">Nutrição</button>
    <button class="qp-btn" onclick="quickSend('Explica as zonas de treino por frequência cardíaca')">Zonas FC</button>
    <button class="qp-btn" onclick="quickSend('Treino intervalado para melhorar potência')">HIIT potência</button>
    <button class="qp-btn" onclick="quickSend('Como melhorar a minha cadência de pedalada?')">Cadência</button>
  </div>

  <div id="input-bar">
    <textarea id="user-input" placeholder="Pergunta ao CycleCoach…" rows="1"
      oninput="autoResize(this)"
      onkeydown="handleKey(event)"></textarea>
    <button id="send-btn" onclick="sendMessage()" disabled>➤</button>
  </div>
</div>

<script>
const SYSTEM = `Você é CycleCoach, um treinador especialista em ciclismo com mais de 15 anos de experiência. Treinas ciclistas de todos os níveis — iniciantes a atletas de competição.

As tuas especialidades:
- Planeamento de treinos (endurance, intervalado, recuperação, fartlek, base)
- Fisiologia do exercício: zonas FC, FTP, VO2max, lactato
- Nutrição e hidratação específica para ciclistas
- Técnica de pedalada, cadência, posicionamento e fit
- Prevenção e recuperação de lesões
- Periodização e planeamento de temporada
- Análise de dados: potência, cadência, TSS, CTL, ATL
- Equipamentos, manutenção e upgrades

Estilo de comunicação:
- Encorajador mas honesto e direto
- Usa terminologia técnica com explicações claras
- Faz perguntas sobre o perfil do atleta quando necessário
- Sugere treinos com estrutura: aquecimento → parte principal → desaquecimento
- Celebra conquistas e progresso

Quando o utilizador se apresentar com um nome, usa-o na conversa.
Responde sempre em Português Europeu (Portugal).`;

let history = [];
let apiKey = '';
let userName = '';
let isLoading = false;

function startApp() {
  const key = document.getElementById('api-key').value.trim();
  const name = document.getElementById('athlete-name').value.trim();
  const errEl = document.getElementById('setup-error');

  if (!key.startsWith('sk-ant-') && !key.startsWith('sk-')) {
    errEl.style.display = 'block';
    errEl.textContent = 'A chave deve começar com "sk-ant-". Verifica e tenta novamente.';
    return;
  }
  errEl.style.display = 'none';

  apiKey = key;
  userName = name;

  localStorage.setItem('cc_key', key);
  localStorage.setItem('cc_name', name);

  document.getElementById('setup').style.display = 'none';
  document.getElementById('app').style.display = 'flex';

  const welcome = userName
    ? `Olá **${userName}**! Sou o CycleCoach, o teu treinador pessoal de ciclismo 🚴\n\nEstou aqui para te ajudar a pedalar mais forte, mais longe e com mais inteligência. Posso ajudar com:\n\n• 📋 Planos de treino personalizados\n• 💪 Zonas de treino e teste de FTP\n• 🍌 Nutrição para ciclistas\n• 🔧 Posicionamento e técnica\n• 📊 Análise de dados de treino\n\nPara começar, conta-me: **qual é o teu nível atual e o teu objetivo principal no ciclismo?**`
    : `Olá! Sou o **CycleCoach**, o teu treinador pessoal de ciclismo 🚴\n\nPosso ajudar-te com treinos, nutrição, técnica e muito mais.\n\nPara começar: **qual é o teu nível atual e o teu objetivo principal?**`;

  addMessage('bot', welcome);

  document.getElementById('user-input').addEventListener('input', () => {
    document.getElementById('send-btn').disabled = !document.getElementById('user-input').value.trim();
  });
}

function resetApp() {
  if (!confirm('Terminar sessão? O histórico desta conversa será apagado.')) return;
  localStorage.removeItem('cc_key');
  localStorage.removeItem('cc_name');
  history = [];
  document.getElementById('messages').innerHTML = '';
  document.getElementById('app').style.display = 'none';
  document.getElementById('setup').style.display = 'flex';
  document.getElementById('api-key').value = '';
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function quickSend(text) {
  document.getElementById('user-input').value = text;
  sendMessage();
}

function formatText(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/^#{1,3} (.+)$/gm, '<div class="section-title">$1</div>')
    .replace(/^• (.+)$/gm, '<li>$1</li>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>\n?)+/g, m => `<ul>${m}</ul>`)
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>');
}

function addMessage(role, text) {
  const div = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = `msg-row ${role}`;

  if (role === 'bot') {
    row.innerHTML = `
      <div class="bot-avatar">🚴</div>
      <div class="bubble bot">${formatText(text)}</div>`;
  } else {
    row.innerHTML = `<div class="bubble user">${text.replace(/\n/g,'<br>')}</div>`;
  }

  div.appendChild(row);
  div.scrollTop = div.scrollHeight;
}

function showTyping() {
  const div = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'typing-row'; row.id = 'typing';
  row.innerHTML = `
    <div class="bot-avatar" style="width:32px;height:32px;border-radius:10px;background:linear-gradient(135deg,#F97316,#C2410C);display:flex;align-items:center;justify-content:center;font-size:16px;margin-right:8px;">🚴</div>
    <div class="typing-bubble">
      <div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>
    </div>`;
  div.appendChild(row);
  div.scrollTop = div.scrollHeight;
}

function hideTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

async function sendMessage() {
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text || isLoading) return;

  input.value = ''; input.style.height = 'auto';
  document.getElementById('send-btn').disabled = true;
  isLoading = true;

  addMessage('user', text);
  history.push({ role: 'user', content: text });
  showTyping();

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-client-side-allow-unsafe-secrets': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1024,
        system: SYSTEM,
        messages: history
      })
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error?.message || `Erro ${res.status}`);
    }

    const data = await res.json();
    const reply = data.content?.map(b => b.text || '').join('') || 'Desculpa, ocorreu um erro.';
    history.push({ role: 'assistant', content: reply });
    hideTyping();
    addMessage('bot', reply);

  } catch (e) {
    hideTyping();
    addMessage('bot', `⚠️ **Erro:** ${e.message}\n\nVerifica a tua chave API e a ligação à internet.`);
  } finally {
    isLoading = false;
    document.getElementById('send-btn').disabled = !input.value.trim();
  }
}

// Auto-fill if key saved
window.addEventListener('load', () => {
  const saved = localStorage.getItem('cc_key');
  const name  = localStorage.getItem('cc_name');
  if (saved) { document.getElementById('api-key').value = saved; }
  if (name)  { document.getElementById('athlete-name').value = name; }
});
</script>
</body>
</html>
